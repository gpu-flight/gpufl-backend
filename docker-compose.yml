services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: gpuflight-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=gpuflight
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: always

volumes:
  timescaledb_data:
