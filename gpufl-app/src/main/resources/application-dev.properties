# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gpuflight
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS — local Vite dev server
gpufl.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Retention
gpufl.retention.enabled=true
gpufl.retention.default-days=7
gpufl.retention.cleanup-cron=0 0 2 * * *

# Logging
logging.level.com.gpuflight.gpuflbackend.dao=TRACE
logging.level.com.gpuflight.gpuflbackend.controller=TRACE
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.data=DEBUG
logging.level.com.gpuflight.gpuflbackend.service=TRACE
